<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zae AI</title>
    <style>
        :root {
            --bg-body: #131314;
            --bg-sidebar: #1E1F20;
            --bg-input: #1E1F20;
            --bg-hover: #282932;
            --bg-message-user: #282932;
            --text-main: #E3E3E3;
            --text-secondary: #9CA0A6;
            --accent-gradient: linear-gradient(90deg, #4285f4, #d96570);
            --sidebar-width: 280px;
            --header-height: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Google Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background-color: var(--bg-sidebar); display: flex; flex-direction: column; padding: 20px 10px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; height: 100%; position: relative; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
            .sidebar.active { transform: translateX(0); }
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }
        .menu-btn { background: none; border: none; cursor: pointer; padding: 10px; border-radius: 50%; color: var(--text-main); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .menu-btn:hover { background-color: var(--bg-hover); }
        .new-chat-btn { margin-top: 20px; background-color: #1A1A1C; border: 1px solid #333; color: #757575; padding: 12px 15px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: 0.2s; }
        .new-chat-btn:hover { background-color: var(--bg-hover); color: var(--text-main); }
        .recent-section { margin-top: 20px; flex-grow: 1; overflow-y: auto; }
        .section-title { font-size: 12px; font-weight: 600; padding: 10px; color: var(--text-main); }
        .chat-history-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 20px; cursor: pointer; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-history-item:hover { background-color: var(--bg-hover); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; }
        .top-bar { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: var(--header-height); position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
        .mobile-menu-trigger { display: none; margin-right: 10px; }
        @media (max-width: 768px) { .mobile-menu-trigger { display: block; } }
        .brand-name { font-size: 20px; color: var(--text-secondary); font-weight: 500; display: flex; align-items: center;}
        .brand-name span { color: var(--text-main); }
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .pro-badge { background-color: #1F1F1F; border: 1px solid #333; font-size: 11px; padding: 6px 12px; border-radius: 8px; font-weight: bold; display: none; }
        @media(min-width: 400px) { .pro-badge { display: block; } }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(45deg, #4285f4, #9b72cb); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .chat-scroll-area { flex: 1; overflow-y: auto; padding-top: var(--header-height); padding-bottom: 120px; display: flex; flex-direction: column; align-items: center; }
        .welcome-screen { display: flex; flex-direction: column; justify-content: center; height: 100%; width: 100%; max-width: 800px; padding: 0 20px; transition: opacity 0.3s ease; }
        .welcome-screen.hidden { display: none; }
        .greeting-text { font-size: clamp(32px, 5vw, 56px); font-weight: 500; margin-bottom: 10px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
        .sub-greeting { font-size: clamp(32px, 5vw, 56px); font-weight: 500; color: #444746; line-height: 1.2; }
        .messages-container { width: 100%; max-width: 800px; padding: 20px; display: none; flex-direction: column; gap: 20px; }
        .messages-container.active { display: flex; }
        .message { display: flex; gap: 15px; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease; }
        .message.user { justify-content: flex-end; }
        .message-content { padding: 0 10px; max-width: 80%; }
        .user .message-content { background-color: var(--bg-message-user); padding: 10px 15px; border-radius: 15px 3px 15px 15px; }
        .ai .message-content { padding-top: 5px; }
        .message-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .icon-ai { background: var(--text-main); color: var(--bg-body); font-weight: bold; font-size: 12px;}
        .input-wrapper-container { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg-body) 80%, transparent); padding: 20px; display: flex; justify-content: center; z-index: 20; }
        .input-box { width: 100%; max-width: 800px; background-color: var(--bg-input); border-radius: 30px; padding: 12px 15px; display: flex; align-items: flex-end; gap: 10px; transition: 0.2s; border: 1px solid transparent; }
        .input-box:focus-within { background-color: #282932; border-color: #444; }
        .input-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.7; border-radius: 50%; transition: 0.2s; }
        .input-icon:hover { background: rgba(255,255,255,0.1); opacity: 1; }
        textarea { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 16px; resize: none; outline: none; max-height: 150px; padding: 5px 0; line-height: 24px; }
        svg { fill: currentColor; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        #server-blocker {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 99999;
            justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }

        .popup-box {
            background-color: #1E1F20; border: 1px solid #444; padding: 40px;
            border-radius: 24px; text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .popup-icon { width: 60px; height: 60px; margin: 0 auto 20px auto; background: rgba(217, 101, 112, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #d96570; }
        .popup-title { font-size: 24px; font-weight: 500; margin-bottom: 10px; color: #E3E3E3; }
        .popup-desc { font-size: 14px; color: #9CA0A6; line-height: 1.5; margin-bottom: 0; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="menu-btn" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
            </button>
        </div>
        <div class="new-chat-btn" onclick="resetChat()">
            <span style="font-size: 20px;">+</span> Percakapan baru
        </div>
        <div class="recent-section">
            <div class="section-title">Terbaru</div>
        </div>
        <div style="margin-top: auto; padding: 10px; font-size: 12px; color: #555;">Zae AI • v2.0 Mobile Ready</div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div style="display: flex; align-items: center;">
                <button class="menu-btn mobile-menu-trigger" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
                </button>
                <div class="brand-name">Zae <span>AI</span></div>
            </div>
            <div class="profile-section">
                <div class="pro-badge">Coba Zae Advanced</div>
                <div class="avatar">I</div>
            </div>
        </header>

        <div class="chat-scroll-area" id="scrollArea">
            <div class="welcome-screen" id="welcomeScreen">
                <h1 class="greeting-text">Halo, Selamat Datang</h1>
                <h2 class="sub-greeting">Apa yang ingin kamu buat hari ini?</h2>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
        </div>

        <div class="input-wrapper-container">
            <div class="input-box">
                <div class="input-icon"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path></svg></div>
                
                <div class="input-icon"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"></path></svg></div>
                
                <textarea id="userInput" placeholder="Masukkan perintah di sini" rows="1"></textarea>
                
                <div class="input-icon"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path></svg></div>
                
                <div class="input-icon" onclick="sendMessage()" style="color: #8ab4f8;"><svg viewBox="0 0 24 24" width="24" height="24" style="transform: rotate(0deg); margin-left: 2px;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></div>
            </div>
        </div>
    </main>

    <div id="server-blocker">
        <div class="popup-box">
            <div class="popup-icon">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"></path>
                </svg>
            </div>
            <h2 class="popup-title">Server Nonaktif</h2>
            <p class="popup-desc">
                Mohon maaf, saat ini sistem sedang dalam perbaikan (Maintenance).<br>
                Silakan kembali lagi nanti.
            </p>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('server-blocker').style.display = 'flex';
            }, 3000);
        };

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleSidebar() { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
        const textarea = document.getElementById('userInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });
        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if(message !== "") {
                document.getElementById('welcomeScreen').classList.add('hidden');
                const msgContainer = document.getElementById('messagesContainer');
                msgContainer.classList.add('active');
                addMessage(message, 'user');
                input.value = ""; input.style.height = 'auto';
                setTimeout(() => { addMessage("Ini adalah simulasi respon dari Zae AI.", 'ai'); }, 1000);
            }
        }
        function addMessage(text, sender) {
            const container = document.getElementById('messagesContainer');
            const scrollArea = document.getElementById('scrollArea');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            let avatarHtml = sender === 'ai' ? `<div class="message-avatar icon-ai"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"></path></svg></div>` : '';
            div.innerHTML = `${avatarHtml}<div class="message-content">${text}</div>${sender === 'user' ? '<div class="message-avatar" style="background:purple; color:white; font-size:12px;">I</div>' : ''}`;
            container.appendChild(div);
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }
        textarea.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        function resetChat() {
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('messagesContainer').classList.remove('active');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            if(window.innerWidth <= 768) toggleSidebar();
        }
    </script>
</body>
</html>
